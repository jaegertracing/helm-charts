{{- if .Values.allInOne.enabled -}}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "jaeger.fullname" . }}-query
  labels:
    {{- include "jaeger.labels" . | nindent 4 }}
    app.kubernetes.io/component: service-query
    {{- if .Values.allInOne.service.query.labels }}
      {{- toYaml .Values.allInOne.service.query.labels | nindent 4 }}
    {{- end }}
  {{- if .Values.allInOne.service.query.annotations }}
  annotations:
    {{- toYaml .Values.allInOne.service.query.annotations | nindent 4 }}
  {{- end }}
spec:
  clusterIP: None
  ports:
    - name: http-query
      port: 16686
      targetPort: 16686
    - name: grpc-query
      port: 16685
      targetPort: 16685
  selector:
    {{- include "jaeger.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: all-in-one
{{- end -}}
